<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Project Bioinformatika</title>

<style>
body{
background:#1e241d;
font-family:Courier New;
color:#d6dfc7;
display:flex;
justify-content:center;
padding:20px;
}

.container{
width:900px;
background:#465544;
border-radius:10px;
overflow:hidden;
}

/* HEADER */
.header-banner img{
width:100%;
height:180px;
object-fit:cover;
display:block;
}

/* NAVBAR */
.navbar{
background:#91a98b;
padding:15px;
display:flex;
gap:10px;
}

.navbar a{
text-decoration:none;
background:#3f4b3d;
color:white;
padding:10px 20px;
border-radius:8px;
transition:0.3s;
}

.navbar a:hover{
background:#b8ff5c;
color:black;
box-shadow:
0 0 10px #b8ff5c,
0 0 20px #b8ff5c;
}

.navbar a.active{
background:#b8ff5c;
color:black;
box-shadow:
0 0 10px #b8ff5c,
0 0 20px #b8ff5c,
0 0 40px #b8ff5c;
}

/* CONTENT */
.content{
padding:25px;
text-align:center;
}

/* DOWNLOAD BUTTON */
.button{
position:relative;
width:250px;
height:65px;
margin:auto;
background:linear-gradient(45deg,#00ffcc,#0099cc);
border-radius:10px;
cursor:pointer;
overflow:hidden;
line-height:65px;
color:white;
font-weight:bold;
font-size:18px;
}

#downloadLink{
text-decoration:none;
}

.progress-bar{
position:absolute;
top:0;
left:0;
width:0%;
height:100%;
background:rgba(255,255,255,0.3);
transition:2s;
}

svg{
position:absolute;
width:40px;
height:40px;
top:12px;
left:105px;
opacity:0;
}

.check{
fill:none;
stroke:#fff;
stroke-width:3;
stroke-linecap:round;
stroke-linejoin:round;
stroke-dasharray:50;
stroke-dashoffset:50;
transition:1s;
}
</style>

</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="header-banner">
<img src="header.jpeg" alt="Header">
</div>

<!-- NAVBAR -->
<div class="navbar">
<a href="index.html">Home</a>
<a href="frekuensi.html">Frekuensi</a>
<a href="gc.html">GC Content</a>
<a href="top3.html">Top 3 GC</a>
<a href="csv.html" class="active">CSV</a>
<a href="grafik.html">Grafik</a>
</div>

<!-- CONTENT -->
<div class="content">

<h1>Download Hasil CSV</h1>

<p>
Klik tombol di bawah untuk mengunduh file hasil analisis GC Content.
</p>

<br>

<a href="hasil.csv" download id="downloadLink">

<div class="button" onclick="downloadAnim()">

<div id="btnText">
Download CSV
</div>

<div class="progress-bar" id="progress"></div>

<svg viewBox="0 0 25 30">
<path class="check"
d="M2,19.2C5.9,23.6,9.4,28,9.4,28L23,2">
</path>
</svg>

</div>

</a>

</div>

</div>

<script>

function downloadAnim(){

document.getElementById("btnText").innerHTML =
"Downloading...";

document.getElementById("progress").style.width =
"100%";

setTimeout(function(){

document.getElementById("btnText").innerHTML =
"";

document.querySelector("svg").style.opacity =
"1";

document.querySelector(".check")
.style.strokeDashoffset = "0";

},2000);

}

</script>

</body>
</html>
